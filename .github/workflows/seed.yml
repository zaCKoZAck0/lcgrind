name: Seed Production Database

on:
  workflow_dispatch:
    inputs:
      scripts:
        description: 'Which seeds to run'
        required: true
        default: 'sync'
        type: choice
        options:
          - sync
          - all
          - leetcode

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.PERSONAL_ACCESS_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Mark sync in progress
        run: |
          STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          PREV_UPDATED=$(grep -oP '(?<=LAST_UPDATED = ")[^"]+' src/config/last-updated.ts || echo '1970-01-01T00:00:00.000Z')
          printf 'export const LAST_UPDATED = "%s";\nexport const IS_SYNCING = true;\nexport const SYNC_STARTED_AT = "%s";\n' "$PREV_UPDATED" "$STARTED_AT" > src/config/last-updated.ts
          git add src/config/last-updated.ts
          if ! git diff --cached --quiet; then
            git push origin --delete chore/sync-in-progress 2>/dev/null || true
            git checkout -b chore/sync-in-progress
            git commit -m "chore: mark sync in progress"
            git push origin chore/sync-in-progress
            gh pr create --title "chore: mark sync in progress" --body "Automated: marking sync in progress" --base main --head chore/sync-in-progress
            gh pr merge chore/sync-in-progress --squash --admin --delete-branch
            git checkout main
            git pull origin main
          fi

      - name: Clone data repo
        run: git clone https://github.com/snehasishroy/leetcode-companywise-interview-questions.git .data

      - run: pnpm prisma generate

      - name: Run seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          case "${{ inputs.scripts }}" in
            sync)     pnpm run seed:sync ;;
            all)      pnpm run seed:all ;;
            leetcode) pnpm run seed:leetcode ;;
          esac

      - name: Update last-updated timestamp
        run: |
          git checkout main
          git pull origin main
          UPDATED_AT=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          printf 'export const LAST_UPDATED = "%s";\nexport const IS_SYNCING = false;\nexport const SYNC_STARTED_AT = "%s";\n' "$UPDATED_AT" "$UPDATED_AT" > src/config/last-updated.ts
          git add src/config/last-updated.ts
          if ! git diff --cached --quiet; then
            git push origin --delete chore/sync-complete 2>/dev/null || true
            git checkout -b chore/sync-complete
            git commit -m "chore: update last-updated timestamp"
            git push origin chore/sync-complete
            gh pr create --title "chore: update last-updated timestamp" --body "Automated: sync complete, updating timestamp" --base main --head chore/sync-complete
            gh pr merge chore/sync-complete --squash --admin --delete-branch
          fi
