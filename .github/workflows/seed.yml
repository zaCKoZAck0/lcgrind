name: Seed Production Database

on:
  workflow_dispatch:
    inputs:
      scripts:
        description: 'Which seeds to run'
        required: true
        default: 'sync'
        type: choice
        options:
          - sync
          - all
          - leetcode
          - sheets

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Clone data repo
        run: git clone https://github.com/snehasishroy/leetcode-companywise-interview-questions.git .data

      - run: pnpm prisma generate

      - name: Run seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          case "${{ inputs.scripts }}" in
            sync)     pnpm run seed:sync ;;
            all)      pnpm run seed:all ;;
            leetcode) pnpm run seed:leetcode ;;
            sheets)   pnpm run seed:sheets ;;
          esac
