name: Seed Production Database

on:
  workflow_dispatch:
    inputs:
      scripts:
        description: 'Which seeds to run'
        required: true
        default: 'sync'
        type: choice
        options:
          - sync
          - all
          - leetcode

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Clone data repo
        run: git clone https://github.com/snehasishroy/leetcode-companywise-interview-questions.git .data

      - run: pnpm prisma generate

      - name: Run seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          case "${{ inputs.scripts }}" in
            sync)     pnpm run seed:sync ;;
            all)      pnpm run seed:all ;;
            leetcode) pnpm run seed:leetcode ;;
          esac

      - name: Update last-updated timestamp
        run: |
          echo "export const LAST_UPDATED = \"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\";" > src/config/last-updated.ts

      - name: Commit and push timestamp
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.PERSONAL_ACCESS_TOKEN }}@github.com/${{ github.repository }}.git
          git add src/config/last-updated.ts
          git diff --cached --quiet || (git commit -m "chore: update last-updated timestamp" && git push origin main)
